name: Benchmarks

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start Memento server
        run: |
          npx memento serve &
          echo "Waiting for Memento server to be ready..."

      - name: Wait for health check
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:21476/api/health > /dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            echo "Attempt $i/60 — waiting..."
            sleep 5
          done
          echo "Server failed to start within timeout."
          exit 1
        timeout-minutes: 10

      - name: Run benchmarks
        run: npx tsx benchmarks/run.ts | tee benchmark-results.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 90
