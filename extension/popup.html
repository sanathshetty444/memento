<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380, initial-scale=1.0">
  <title>Memento Memory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e94560;
    }

    .status-dot.connected {
      background: #4ecca3;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #e94560;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #c73852;
    }

    .btn-secondary {
      background: #0f3460;
      color: #e0e0e0;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #16213e;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #0f3460;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #e94560;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    .tags-input {
      margin-top: 8px;
    }

    .search-input {
      margin-bottom: 8px;
    }

    .results {
      max-height: 200px;
      overflow-y: auto;
    }

    .result-item, .memory-item {
      padding: 8px 10px;
      margin-bottom: 4px;
      background: #16213e;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
    }

    .result-item .score {
      font-size: 10px;
      color: #4ecca3;
      float: right;
    }

    .memory-item .meta {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    .memory-item .tags {
      display: inline-flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #0f3460;
      color: #4ecca3;
    }

    .content-preview {
      word-break: break-word;
    }

    .empty-state {
      text-align: center;
      padding: 16px;
      color: #555;
      font-size: 12px;
    }

    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      color: #fff;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.success { background: #4ecca3; }
    .toast.error { background: #e94560; }
    .toast.visible { opacity: 1; }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Memento Memory</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </header>

  <div class="section">
    <div class="btn-row">
      <button class="btn-primary" id="savePageBtn" disabled>Save Page</button>
      <button class="btn-secondary" id="saveSelectionBtn" disabled>Save Selection</button>
    </div>
    <input type="text" class="tags-input" id="tagsInput" placeholder="Tags (comma-separated)">
  </div>

  <div class="section">
    <div class="section-title">Search Memories</div>
    <input type="text" class="search-input" id="searchInput" placeholder="Search your memories...">
    <div class="results" id="searchResults"></div>
  </div>

  <div class="section">
    <div class="section-title">Recent Memories</div>
    <div id="recentMemories">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
